<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星引擎 PVE 随机助手</title>
    <link rel="icon" href="images/icons/icon.png" type="image/png">
    <style>
        body { 
            background-image: url('images/background.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #333;
            color: white; 
            font-family: "Microsoft YaHei", sans-serif; 
            margin: 0; 
            padding: 20px; 
            scroll-behavior: smooth; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: rgba(68, 68, 68, 0.88);
            backdrop-filter: blur(5px);
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            position: relative; 
        }
        .tabs { 
            display: flex; 
            align-items: center;
            gap: 10px; 
            margin-bottom: 20px; 
            border-bottom: 2px solid #555; 
            padding-bottom: 10px; 
            flex-wrap: wrap; 
            position: sticky; 
            top: 0; 
            background: rgba(68, 68, 68, 0.95); 
            z-index: 100; 
        }
        .tab-right-text {
            margin-left: auto;
            color: #99FF00;
            font-size: 14px;
            font-weight: bold;
            padding-right: 5px;
            text-shadow: 0 0 5px rgba(153, 255, 0, 0.3);
            white-space: nowrap;
        }
        .tab-btn { padding: 12px 24px; background: #555; color: white; border: none; cursor: pointer; border-radius: 4px 4px 0 0; font-size: 16px; font-weight: bold; transition: 0.2s; }
        .tab-btn:hover { background: #777; }
        .tab-btn.active { background: #E6007E; color: white; }

        .sub-tabs { display: flex; gap: 5px; border-bottom: 2px solid #E6007E; margin-bottom: 15px; }
        .sub-tab-btn { padding: 8px 20px; background: #333; color: #ccc; border: none; cursor: pointer; border-radius: 4px 4px 0 0; font-weight: bold; transition: 0.2s; }
        .sub-tab-btn:hover { background: #555; }
        .sub-tab-btn.active { background: #E6007E; color: white; }
        .sub-tab-content { display: none; }
        .sub-tab-content.active { display: block; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .row { display: flex; border: 1px solid #777; margin-bottom: 2px; }
        .row-header { width: 100px; background: #E6007E; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; padding: 10px; flex-shrink: 0; }
        .row-content { flex-grow: 1; background: rgba(85, 85, 85, 0.6); padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .tag-checkbox { display: none; }
        .tag-label { display: inline-block; padding: 6px 14px; background: #E6007E; color: white; border-radius: 4px; cursor: pointer; user-select: none; border: 2px solid transparent; transition: 0.2s; font-size: 14px; }
        .tag-checkbox:checked + .tag-label { background: #99FF00; color: black; border-color: black; font-weight: bold; }
        .controls-box { background: rgba(58, 58, 58, 0.8); padding: 15px; margin-bottom: 15px; border-radius: 4px; border-left: 5px solid #E6007E; }
        .controls-box h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: #eee; }
        .small-btn { padding: 6px 12px; background: #222; color: white; border: 1px solid #777; cursor: pointer; border-radius: 4px; margin-right: 8px; margin-bottom: 8px; transition: 0.2s; font-size: 13px; }
        .small-btn:hover { background: #E6007E; border-color: #E6007E; }
        .small-btn.highlight { background: #E6007E; border-color: #E6007E; }
        .small-btn.green { border-color: #99FF00; color: #99FF00; }
        .action-btn { padding: 12px 30px; font-size: 18px; background: #99FF00; border: 2px solid black; color: black; cursor: pointer; border-radius: 8px; font-weight: bold; box-shadow: 2px 2px 0px black; transition: 0.1s; }
        .action-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px black; }
        .share-code-area { width: 100%; box-sizing: border-box; background: #1a1a1a; color: #99FF00; border: 1px solid #ffffff; border-radius: 6px; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; min-height: 150px; resize: vertical; margin-top: 10px; outline: none; font-size: 14px; line-height: 1.5; }
        .result-box { margin-top: 20px; padding: 20px; background: rgba(34, 34, 34, 0.9); border: 2px dashed #555; text-align: center; min-height: 300px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .result-box.locked { border-color: #99FF00; transform: scale(1.02); }
        .result-text { font-size: 26px; font-weight: bold; color: #bbb; margin-bottom: 15px; }
        .result-box.locked .result-text { color: #99FF00; text-shadow: 0px 0px 10px rgba(153, 255, 0, 0.6); }
        .result-image { display: none; max-width: 90%; max-height: 250px; border-radius: 8px; border: 2px solid #777; object-fit: cover; }
        .result-image.visible { display: block; }
        #back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: #E6007E; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 999; font-size: 12px; font-weight: bold; border: 2px solid white; text-align: center; }
        #back-to-top.show { opacity: 0.9; visibility: visible; }
        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #E6007E; color: white; padding: 12px 25px; border-radius: 25px; z-index: 1000; opacity: 0; transition: opacity 0.4s; font-weight: bold; pointer-events: none; }
        #toast.show { opacity: 1; }
        
        .radio-group { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .radio-label { cursor: pointer; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .radio-label input[type="radio"] { cursor: pointer; width: 18px; height: 18px; accent-color: #E6007E; }

        @media screen and (max-width: 768px) {
            .tab-btn { flex-grow: 1; padding: 12px 5px; font-size: 13px; }
            .row { flex-direction: column; border: none; background: rgba(85, 85, 85, 0.8); border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
            .row-header { width: auto; border-bottom: 1px solid #444; }
            .sub-tab-btn { padding: 8px 10px; font-size: 13px; flex-grow: 1; text-align: center; }
        }

        .team-result-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; width: 100%; }
        .team-slot { background: rgba(34, 34, 34, 0.9); border: 2px dashed #555; border-radius: 8px; padding: 10px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; transition: 0.2s; }
        .team-slot.locked { border-color: #99FF00; background: rgba(50, 50, 50, 0.9); box-shadow: 0 0 15px rgba(153, 255, 0, 0.2); }
        .team-slot .result-text { font-size: 16px; margin-bottom: 10px; }
        .team-slot .result-image { max-height: 120px; max-width: 100%; border-width: 1px; }

        @media screen and (max-width: 768px) {
            .team-result-container { grid-template-columns: repeat(2, 1fr); }
        }
        .team-slot.locked .result-text {color: #99FF00; text-shadow: 0px 0px 8px rgba(153, 255, 0, 0.5); }
        .team-slot.locked span[id^="team-status-"] {color: #99FF00 !important; opacity: 0.8; }
    </style>
</head>
<body>

<div id="back-to-top" onclick="window.scrollTo({top:0, behavior:'smooth'})">TOP<br>顶部</div>
<div id="toast"></div>

<div class="container">
    <div class="tabs">
        <button id="btn-map" class="tab-btn active" onclick="switchTab('tab-map', this)">地图随机</button>
        <button id="btn-char" class="tab-btn" onclick="switchTab('tab-char', this)">角色随机</button>
        <button id="btn-team" class="tab-btn" onclick="switchTab('tab-team', this)">全员随机</button>
        <button id="btn-settings" class="tab-btn" onclick="switchTab('tab-settings', this)">预设角色</button>
        <span class="tab-right-text">QQ: 2096317545</span>
    </div>

    <div id="tab-map" class="tab-content active">
        <div class="controls-box">
            <h3>地图控制</h3>
            <div style="margin-bottom: 10px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px;">
                <button class="small-btn" style="margin-bottom: 0;" onclick="toggleAllMaps(true)">全选所有地图</button>
                <button class="small-btn" style="margin-bottom: 0;" onclick="toggleAllMaps(false)">清空地图选择</button>
                <label style="font-size: 14px; cursor: pointer; color: #ddd;"><input type="checkbox" id="map-no-repeat"> 避免地图重复</label>
                <label style="font-size: 14px; cursor: pointer; color: #ddd;"><input type="checkbox" id="map-difficulty"> 增加随机难度</label>
            </div>
            <div class="row">
                <div class="row-header">全部地图</div>
                <div class="row-content" id="map-list-container"></div>
            </div>
        </div>
        <div class="action-container" style="text-align: center; margin-top: 20px;">
            <button class="action-btn" onclick="randomizeMap(this)">开始抽取地图</button>
            <div id="map-result" class="result-box">
                <span id="map-result-text" class="result-text">等待抽取...</span>
                <img src="" class="result-image" id="map-result-image">
            </div>
        </div>
    </div>

    <div id="tab-char" class="tab-content">
        <div class="controls-box">
            <h3>选择你的位置</h3>
            <p style="font-size: 13px; color: #aaa; margin-top: 0;">抽取时，将自动读取并使用【预设角色】页面中对应玩家位置的预设卡池。</p>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="single-role-pos" value="p1" checked> 1P</label>
                <label class="radio-label"><input type="radio" name="single-role-pos" value="p2"> 2P</label>
                <label class="radio-label"><input type="radio" name="single-role-pos" value="p3"> 3P</label>
                <label class="radio-label"><input type="radio" name="single-role-pos" value="p4"> 4P</label>
            </div>
        </div>
        <div class="action-container" style="text-align: center; margin-top: 20px;">
            <button class="action-btn" onclick="randomizeChar(this)">开始抽取角色</button>
            <div id="char-result" class="result-box">
                <span id="char-result-text" class="result-text">等待抽取...</span>
                <img src="" class="result-image" id="char-result-image">
            </div>
        </div>
    </div>
    
    <div id="tab-team" class="tab-content">
        <div class="controls-box">
            <h3>职责与位置划分</h3>
            <p style="font-size: 13px; color: #aaa; margin-top: 0;">点击抽取后，将自动根据【预设角色】页面中 1P、2P、3P、4P 各自配置的独立卡池进行全队不重复抽取。Ciallo～(∠・ω< )⌒☆</p>
        </div>

        <div class="action-container" style="text-align: center; margin-top: 20px;">
            <button class="action-btn" onclick="randomizeTeam(this)" style="padding: 15px 40px; font-size: 22px;">开始全队抽取</button>
            
            <div class="team-result-container">
                <div id="team-slot-1" class="team-slot">
                    <span id="team-status-1" class="result-text" style="color:#aaa; font-size: 14px;">1P 等待中</span>
                    <span id="team-txt-1" class="result-text">---</span>
                    <img src="" class="result-image" id="team-img-1">
                </div>
                <div id="team-slot-2" class="team-slot">
                    <span id="team-status-2" class="result-text" style="color:#aaa; font-size: 14px;">2P 等待中</span>
                    <span id="team-txt-2" class="result-text">---</span>
                    <img src="" class="result-image" id="team-img-2">
                </div>
                <div id="team-slot-3" class="team-slot">
                    <span id="team-status-3" class="result-text" style="color:#aaa; font-size: 14px;">3P 等待中</span>
                    <span id="team-txt-3" class="result-text">---</span>
                    <img src="" class="result-image" id="team-img-3">
                </div>
                <div id="team-slot-4" class="team-slot">
                    <span id="team-status-4" class="result-text" style="color:#aaa; font-size: 14px;">4P 等待中</span>
                    <span id="team-txt-4" class="result-text">---</span>
                    <img src="" class="result-image" id="team-img-4">
                </div>
            </div>
        </div>
    </div>
    
    <div id="tab-settings" class="tab-content">
        <div class="controls-box">
            <h3>自定义全部位置玩家角色池</h3>
            <div class="sub-tabs">
                <button id="sbtn-p1" class="sub-tab-btn active" onclick="switchSettingsTab('p1', this)">1P 角色池</button>
                <button id="sbtn-p2" class="sub-tab-btn" onclick="switchSettingsTab('p2', this)">2P 角色池</button>
                <button id="sbtn-p3" class="sub-tab-btn" onclick="switchSettingsTab('p3', this)">3P 角色池</button>
                <button id="sbtn-p4" class="sub-tab-btn" onclick="switchSettingsTab('p4', this)">4P 角色池</button>
            </div>

            <div id="settings-area-p1" class="sub-tab-content active">
                <div style="margin-bottom: 10px;">
                    <button class="small-btn green" onclick="toggleSettingsAll('p1', true)">全选所有</button>
                    <button class="small-btn" onclick="toggleSettingsAll('p1', false)">清空所有</button>
                    <button class="small-btn highlight" onclick="loadDefaultToPos('p1', 'support')" style="float: right;">载入系统推荐 (辅助)</button>
                </div>
                <div id="settings-p1-batch"></div>
                <div id="settings-p1-list"></div>
            </div>

            <div id="settings-area-p2" class="sub-tab-content">
                <div style="margin-bottom: 10px;">
                    <button class="small-btn green" onclick="toggleSettingsAll('p2', true)">全选所有</button>
                    <button class="small-btn" onclick="toggleSettingsAll('p2', false)">清空所有</button>
                    <button class="small-btn highlight" onclick="loadDefaultToPos('p2', 'support')" style="float: right;">载入系统推荐 (辅助)</button>
                </div>
                <div id="settings-p2-batch"></div>
                <div id="settings-p2-list"></div>
            </div>

            <div id="settings-area-p3" class="sub-tab-content">
                <div style="margin-bottom: 10px;">
                    <button class="small-btn green" onclick="toggleSettingsAll('p3', true)">全选所有</button>
                    <button class="small-btn" onclick="toggleSettingsAll('p3', false)">清空所有</button>
                    <button class="small-btn highlight" onclick="loadDefaultToPos('p3', 'dps')" style="float: right;">载入系统推荐 (输出)</button>
                </div>
                <div id="settings-p3-batch"></div>
                <div id="settings-p3-list"></div>
            </div>

            <div id="settings-area-p4" class="sub-tab-content">
                <div style="margin-bottom: 10px;">
                    <button class="small-btn green" onclick="toggleSettingsAll('p4', true)">全选所有</button>
                    <button class="small-btn" onclick="toggleSettingsAll('p4', false)">清空所有</button>
                    <button class="small-btn highlight" onclick="loadDefaultToPos('p4', 'dps')" style="float: right;">载入系统推荐 (输出)</button>
                </div>
                <div id="settings-p4-batch"></div>
                <div id="settings-p4-list"></div>
            </div>
        </div>

        <div class="controls-box">
            <h3>配置导出与同步</h3>
            <button class="small-btn highlight" onclick="exportSettings()">生成并自动复制识别码 </button>
            <textarea id="share-code-export" class="share-code-area" readonly placeholder="识别码生成区域..."></textarea>
            <div style="margin-top: 25px; border-top: 1px dashed #555; padding-top: 15px;">
                <p style="font-size: 13px; color: #aaa; margin-bottom: 10px;">导入队友的识别码 ：</p>
                <textarea id="share-code-import" class="share-code-area" placeholder="在此粘贴他人的识别码..."></textarea>
                <button class="action-btn" onclick="importSettings()" style="width: 100%; margin-top: 15px; font-size: 16px;">覆盖并应用导入配置</button>
            </div>
        </div>
    </div>
</div>

<script>
    const allMaps = [ "星趴·梦想号", "御魂庆典", "水乡古镇", "魔法学院", "龙宫游乐园", "幽魂暗巷", "园林中庭" ];
    const allRawChars = { 
        "一期": ["商业之主", "古怪神探", "社恐修女", "暗影忍者", "社员叔叔", "猩红辣妹", "游戏大师", "看板娘", "垃圾箱", "肉蛋战车", "史莱姆", "旗袍娘"], 
        "二期": ["命运少女", "太刀使", "绿洲女王", "家政机器人", "午夜闪光", "网络魅影"], 
        "三期": ["暗区少主", "新人调查员", "机械超人", "风水师", "三神御主", "枪匠"], 
        "四期": ["小猎手", "沼之蛟龙", "毒苹果"], 
        "联动": ["超天酱", "糖糖", "吉尔", "多萝西"] 
    };
    
    //默认推荐名单
    const defaultSupportChars = ["商业之主", "古怪神探", "游戏大师", "看板娘", "史莱姆", "命运少女", "暗区少主", "风水师", "三神御主", "沼之蛟龙", "毒苹果", "超天酱", "吉尔"];
    const defaultDpsChars = ["社恐修女", "暗影忍者", "社员叔叔", "猩红辣妹", "看板娘", "垃圾箱", "肉蛋战车", "旗袍娘", "太刀使", "绿洲女王", "家政机器人", "午夜闪光", "网络魅影", "新人调查员", "机械超人", "三神御主", "枪匠", "小猎手", "沼之蛟龙", "毒苹果", "糖糖", "多萝西"];

    const mapsData = allMaps.map(name => ({ name, image: `images/maps/${name}.png` }));
    let allCharObjects = [];
    Object.keys(allRawChars).forEach(p => {
        allRawChars[p].forEach(name => allCharObjects.push({ name, image: `images/characters/${name}.png`, phase: p }));
    });

    let lastRolledMap = null;
    const difficulties = ["普通", "困难", "噩梦", "疯狂"];
    
    function preloadAssets() {
        const allImages = [...mapsData.map(m => m.image), ...allCharObjects.map(c => c.image)];
        allImages.forEach(src => { const img = new Image(); img.src = src; });
    }
    
    function getStoredData(key, defaultData) {
        try {
            const stored = JSON.parse(localStorage.getItem(key));
            return (stored && Array.isArray(stored) && stored.length > 0) ? stored : [...defaultData];
        } catch(e) { return [...defaultData]; }
    }

    let customP1 = getStoredData('customP1', defaultSupportChars);
    let customP2 = getStoredData('customP2', defaultSupportChars);
    let customP3 = getStoredData('customP3', defaultDpsChars);
    let customP4 = getStoredData('customP4', defaultDpsChars);

    window.onscroll = () => {
        const topBtn = document.getElementById('back-to-top');
        (document.documentElement.scrollTop > 300) ? topBtn.classList.add('show') : topBtn.classList.remove('show');
    };

    window.onload = () => {
        const mapBox = document.getElementById('map-list-container');
        mapsData.forEach((m, i) => {
            mapBox.innerHTML += `<div><input type="checkbox" id="m-${i}" class="map-checkbox tag-checkbox" value="${m.name}" checked><label for="m-${i}" class="tag-label">${m.name}</label></div>`;
        });
        renderSettingsLists();
        setTimeout(preloadAssets, 1000);
    };

    function renderSettingsLists() {
        const positions = ['p1', 'p2', 'p3', 'p4'];
        positions.forEach(pos => {
            const listContainer = document.getElementById(`settings-${pos}-list`);
            const batchContainer = document.getElementById(`settings-${pos}-batch`);
            listContainer.innerHTML = ''; batchContainer.innerHTML = '';
            let currentArray = (pos==='p1')?customP1:(pos==='p2')?customP2:(pos==='p3')?customP3:customP4;
            Object.keys(allRawChars).forEach(phase => {
                batchContainer.innerHTML += `<button class="small-btn" onclick="toggleSettingsPhase('${phase}', '${pos}')">选/不选 ${phase}</button>`;
                let row = `<div class="row"><div class="row-header">${phase}</div><div class="row-content">`;
                allCharObjects.filter(c => c.phase === phase).forEach(c => {
                    const id = `set-${pos}-${c.name}`;
                    const isChecked = currentArray.includes(c.name) ? 'checked' : '';
                    row += `<div><input type="checkbox" id="${id}" class="set-cb-${pos} tag-checkbox" data-phase="${phase}" value="${c.name}" onchange="updatePreset('${pos}','${c.name}',this.checked)" ${isChecked}><label for="${id}" class="tag-label">${c.name}</label></div>`;
                });
                listContainer.innerHTML += row + `</div></div>`;
            });
        });
    }

    function loadDefaultToPos(pos, type) {
        const arr = (type === 'support') ? [...defaultSupportChars] : [...defaultDpsChars];
        if(pos === 'p1') customP1 = arr; else if(pos === 'p2') customP2 = arr; else if(pos === 'p3') customP3 = arr; else customP4 = arr;
        localStorage.setItem(`custom${pos.toUpperCase()}`, JSON.stringify(arr));
        renderSettingsLists();
        showToast(`已为 ${pos.toUpperCase()} 载入系统推荐卡池！`);
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }

    function switchSettingsTab(pos, btn) {
        document.querySelectorAll('.sub-tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`settings-area-${pos}`).classList.add('active');
        btn.classList.add('active');
    }

    function toggleAllMaps(s) { document.querySelectorAll('.map-checkbox').forEach(c => c.checked = s); }
    function toggleSettingsAll(pos, s) {
        document.querySelectorAll(`.set-cb-${pos}`).forEach(cb => { cb.checked = s; updatePreset(pos, cb.value, s, true); });
        showToast(`已${s?'全选':'清空'} ${pos.toUpperCase()} 列表`);
    }
    function toggleSettingsPhase(phase, pos) {
        const cbs = document.querySelectorAll(`.set-cb-${pos}[data-phase="${phase}"]`);
        const all = Array.from(cbs).every(c => c.checked);
        cbs.forEach(cb => { cb.checked = !all; updatePreset(pos, cb.value, !all, true); });
        showToast(`已批量更新 ${pos.toUpperCase()} 的 ${phase}`);
    }
    function updatePreset(pos, name, isAdd, silent = false) {
        let arr = (pos==='p1')?customP1:(pos==='p2')?customP2:(pos==='p3')?customP3:customP4;
        const i = arr.indexOf(name);
        if(isAdd && i === -1) arr.push(name); else if(!isAdd && i > -1) arr.splice(i, 1);
        localStorage.setItem(`custom${pos.toUpperCase()}`, JSON.stringify(arr));
        if(!silent) showToast('设置已自动保存');
    }
    
    function exportSettings() {
        const area = document.getElementById('share-code-export');
        const code = btoa(unescape(encodeURIComponent(JSON.stringify({ p1: customP1, p2: customP2, p3: customP3, p4: customP4 }))));
        area.value = code; area.select();
        try { navigator.clipboard.writeText(code).then(() => showToast('识别码已复制！')); } catch (e) { document.execCommand('copy'); showToast('识别码已生成！'); }
    }
    
    function importSettings() {
        try {
            const raw = document.getElementById('share-code-import').value.trim();
            if(!raw) return showToast('请输入识别码', true);
            const data = JSON.parse(decodeURIComponent(escape(atob(raw))));
            if(data.s && data.d && !data.p1) {
                customP1 = data.s; customP2 = data.s; customP3 = data.d; customP4 = data.d;
                showToast('检测到旧版配置，已智能转换！');
            } else if (data.p1) {
                customP1 = data.p1; customP2 = data.p2; customP3 = data.p3; customP4 = data.p4;
                showToast('导入成功！');
            }
            localStorage.setItem('customP1', JSON.stringify(customP1)); localStorage.setItem('customP2', JSON.stringify(customP2));
            localStorage.setItem('customP3', JSON.stringify(customP3)); localStorage.setItem('customP4', JSON.stringify(customP4));
            renderSettingsLists();
        } catch(e) { showToast('识别码无效', true); }
    }
    
    function showToast(m, err=false) {
        const t = document.getElementById('toast');
        t.textContent = m; t.style.background = err ? '#D32F2F' : '#E6007E';
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
    }

    function runRouletteAnimation(btn, boxId, txtId, imgId, options, sP, fP, onComplete = null, formatName = null) {
        const box = document.getElementById(boxId), txt = document.getElementById(txtId), img = document.getElementById(imgId);
        if(!options.length) return showToast("预设池为空！", true);
        btn.disabled = true; box.classList.remove("locked"); img.classList.add("visible");
        let d = 120;
        const tick = () => {
            const item = options[Math.floor(Math.random()*options.length)];
            const displayName = formatName ? formatName(item.name) : item.name;
            txt.innerText = sP + displayName; img.src = item.image;
            if(d < 450) { d *= 1.12; setTimeout(tick, d); } 
            else { 
                box.classList.add("locked"); img.src = item.image;
                txt.innerText = fP + (formatName ? formatName(item.name) : item.name); 
                btn.disabled = false; if(onComplete) onComplete(item.name);
            }
        };
        tick();
    }

    function randomizeMap(b) {
        const names = Array.from(document.querySelectorAll('.map-checkbox:checked')).map(c => c.value);
        let availableMaps = mapsData.filter(m => names.includes(m.name));
        if (document.getElementById('map-no-repeat').checked && availableMaps.length > 1 && lastRolledMap) {
            availableMaps = availableMaps.filter(m => m.name !== lastRolledMap);
        }
        const formatName = (baseName) => {
            if (!document.getElementById('map-difficulty').checked) return baseName;
            return baseName + "·" + difficulties[Math.floor(Math.random() * difficulties.length)];
        };
        runRouletteAnimation(b, 'map-result', 'map-result-text', 'map-result-image', availableMaps, "正在选择：", "随机完毕：", (n) => { lastRolledMap = n; }, formatName);
    }
    
    function randomizeChar(b) {
        const selectedPos = document.querySelector('input[name="single-role-pos"]:checked').value;
        let arr = (selectedPos==='p1')?customP1:(selectedPos==='p2')?customP2:(selectedPos==='p3')?customP3:customP4;
        const pool = allCharObjects.filter(c => arr.includes(c.name));
        if(pool.length === 0) return showToast(`【${selectedPos.toUpperCase()} 角色池】为空！`, true);
        runRouletteAnimation(b, 'char-result', 'char-result-text', 'char-result-image', pool, "正在选择：", "随机完毕：");
    }

    function randomizeTeam(btn) {
        const poolData = [
            { id: "p1", name: "1P", pool: allCharObjects.filter(c => customP1.includes(c.name)) },
            { id: "p2", name: "2P", pool: allCharObjects.filter(c => customP2.includes(c.name)) },
            { id: "p3", name: "3P", pool: allCharObjects.filter(c => customP3.includes(c.name)) },
            { id: "p4", name: "4P", pool: allCharObjects.filter(c => customP4.includes(c.name)) }
        ];

        //空池验证
        for(let p of poolData) {
            if(p.pool.length === 0) return showToast(`【${p.name} 角色池】当前为空！`, true);
        }

        //随机性检测
        let singleWarnings = [];
        poolData.forEach(p => {
            if(p.pool.length === 1) {
                singleWarnings.push(`${p.name} 随机池只选取了：【${p.pool[0].name}】`);
            }
        });

        if(singleWarnings.length > 0) {
            const confirmMsg = "检测到以下随机池缺乏随机性：\n\n" + 
                               singleWarnings.join("\n") + 
                               "\n\n是否继续随机？\n(取消将跳转至预设页面进行调整)";
            
            if(!confirm(confirmMsg)) {
                // 跳转逻辑
                switchTab('tab-settings', document.getElementById('btn-settings'));
                // 自动定位到第一个出现问题的P位子页签
                const firstIssuePos = poolData.find(p => p.pool.length === 1).id;
                switchSettingsTab(firstIssuePos, document.getElementById('sbtn-' + firstIssuePos));
                return; // 终止随机
            }
        }

        btn.disabled = true;
        const slots = [1, 2, 3, 4].map(i => {
            const box = document.getElementById(`team-slot-${i}`);
            const img = document.getElementById(`team-img-${i}`);
            const txt = document.getElementById(`team-txt-${i}`);
            const statusTxt = document.getElementById(`team-status-${i}`);
            box.classList.remove('locked'); img.classList.add('visible');
            return { pool: poolData[i-1].pool, box, img, txt, statusTxt, id: i };
        });

        let d = 120;
        const tick = () => {
            let usedNames = new Set(); 
            slots.forEach(s => {
                let available = s.pool.filter(item => !usedNames.has(item.name));
                if (available.length === 0) available = s.pool; 
                const item = available[Math.floor(Math.random() * available.length)];
                usedNames.add(item.name);
                s.img.src = item.image; s.txt.innerText = item.name;
                s.statusTxt.innerText = `${s.id}P 正在选择...`;
                s.finalItem = item;
            });

            if(d < 450) { d *= 1.12; setTimeout(tick, d); } 
            else { 
                slots.forEach(s => {
                    s.box.classList.add('locked');
                    s.img.src = s.finalItem.image; s.txt.innerText = s.finalItem.name;
                    s.statusTxt.innerText = `${s.id}P 随机完毕`; 
                });
                btn.disabled = false;
                showToast("全队随机完毕！");
            }
        };
        tick();
    }
</script>
